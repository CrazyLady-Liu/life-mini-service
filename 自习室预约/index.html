<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自习室预约系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📚 自习室预约管理系统</h1>
            <p class="subtitle">安静学习，高效成长</p>
        </header>

        <main class="main-content">
            <section class="panel date-panel">
                <div class="panel-header">
                    <h2>📅 选择日期</h2>
                </div>
                <div class="date-selector">
                    <button class="date-nav" id="prevDay">←</button>
                    <div class="date-display">
                        <span id="currentDate"></span>
                        <span class="weekday" id="currentWeekday"></span>
                    </div>
                    <button class="date-nav" id="nextDay">→</button>
                </div>
                <div class="quick-dates" id="quickDates"></div>
                <div style="text-align: center; margin-top: 16px;">
                    <button class="btn btn-confirm" id="demoBtn" style="width: auto; padding: 10px 24px;">🎬 演示预约流程</button>
                </div>
            </section>

            <section class="panel status-panel">
                <div class="panel-header">
                    <h2>📊 实时空位统计</h2>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">🪑</div>
                        <div class="stat-info">
                            <span class="stat-label">总座位数</span>
                            <span class="stat-value" id="totalSeats">0</span>
                        </div>
                    </div>
                    <div class="stat-card available">
                        <div class="stat-icon">✅</div>
                        <div class="stat-info">
                            <span class="stat-label">空闲座位</span>
                            <span class="stat-value" id="availableSeats">0</span>
                        </div>
                    </div>
                    <div class="stat-card occupied">
                        <div class="stat-icon">⏳</div>
                        <div class="stat-info">
                            <span class="stat-label">已预约</span>
                            <span class="stat-value" id="occupiedSeats">0</span>
                        </div>
                    </div>
                    <div class="stat-card my-booking">
                        <div class="stat-icon">📝</div>
                        <div class="stat-info">
                            <span class="stat-label">我的预约</span>
                            <span class="stat-value" id="myBookings">0</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="panel seat-panel">
                <div class="panel-header">
                    <h2>🪑 座位选择</h2>
                    <div class="legend">
                        <span class="legend-item"><span class="seat-legend available"></span> 空闲</span>
                        <span class="legend-item"><span class="seat-legend occupied"></span> 已预约</span>
                        <span class="legend-item"><span class="seat-legend selected"></span> 已选中</span>
                        <span class="legend-item"><span class="seat-legend my"></span> 我的预约</span>
                    </div>
                </div>
                <div class="seat-container">
                    <div class="teacher-desk">讲台</div>
                    <div class="seat-grid" id="seatGrid"></div>
                </div>
            </section>

            <section class="panel booking-panel" id="bookingPanel" style="display: none;">
                <div class="panel-header">
                    <h2>📝 预约信息</h2>
                </div>
                <div class="booking-form">
                    <div class="form-group">
                        <label>选中座位</label>
                        <span id="selectedSeatNum" class="seat-number"></span>
                    </div>
                    <div class="form-group">
                        <label>预约时段</label>
                        <select id="timeSlot">
                            <option value="08:00-12:00">上午 08:00 - 12:00</option>
                            <option value="14:00-18:00">下午 14:00 - 18:00</option>
                            <option value="19:00-22:00">晚上 19:00 - 22:00</option>
                            <option value="08:00-22:00">全天 08:00 - 22:00</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="studentName" placeholder="请输入姓名">
                    </div>
                    <div class="form-group">
                        <label>学号</label>
                        <input type="text" id="studentId" placeholder="请输入学号">
                    </div>
                    <div class="form-actions">
                        <button class="btn btn-cancel" id="cancelSelect">取消选择</button>
                        <button class="btn btn-confirm" id="confirmBooking">确认预约</button>
                    </div>
                </div>
            </section>

            <section class="panel my-bookings-panel">
                <div class="panel-header">
                    <h2>📋 我的预约记录</h2>
                </div>
                <div class="bookings-list" id="bookingsList">
                    <p class="empty-tip">暂无预约记录</p>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>© 2026 自习室预约管理系统 | 保持安静，共同进步</p>
        </footer>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="modal-icon" id="modalIcon">✅</span>
            <h3 id="modalTitle">提示</h3>
            <p id="modalMessage"></p>
            <button class="btn btn-confirm" id="modalClose">确定</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
