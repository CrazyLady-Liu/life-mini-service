<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乐学App - 教师管理后台</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 240px;
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 24px 0;
      overflow-y: auto;
      z-index: 100;
    }
    
    .logo {
      text-align: center;
      padding: 0 24px 32px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .logo-icon {
      font-size: 40px;
      margin-bottom: 8px;
    }
    
    .logo h1 {
      font-size: 20px;
      margin-bottom: 4px;
    }
    
    .logo p {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .nav-menu {
      padding: 16px 0;
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-left: 3px solid transparent;
    }
    
    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    
    .nav-item.active {
      background: rgba(255, 255, 255, 0.15);
      border-left-color: #fff;
    }
    
    .nav-icon {
      margin-right: 12px;
      font-size: 18px;
    }
    
    .nav-text {
      font-size: 14px;
    }
    
    .main-content {
      margin-left: 240px;
      padding: 24px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .header h2 {
      font-size: 24px;
      color: #333;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .user-name {
      font-size: 14px;
      color: #666;
    }
    
    .logout-btn {
      padding: 8px 16px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #666;
      transition: all 0.3s ease;
    }
    
    .logout-btn:hover {
      background: #f5f5f5;
      border-color: #999;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }
    
    .stat-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: #333;
      margin-bottom: 4px;
    }
    
    .stat-label {
      font-size: 14px;
      color: #999;
    }
    
    .stat-card.blue .stat-icon { color: #1890ff; }
    .stat-card.green .stat-icon { color: #52c41a; }
    .stat-card.orange .stat-icon { color: #fa8c16; }
    .stat-card.purple .stat-icon { color: #722ed1; }
    
    .filter-bar {
      background: #fff;
      padding: 20px 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .filter-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .filter-label {
      font-size: 14px;
      color: #666;
      font-weight: 500;
    }
    
    .filter-select {
      padding: 8px 16px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 14px;
      min-width: 160px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .filter-select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
    }
    
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    
    .chart-card {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    
    .chart-card.full-width {
      grid-column: 1 / -1;
    }
    
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .chart-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    
    .chart-subtitle {
      font-size: 12px;
      color: #999;
    }
    
    .chart-container {
      width: 100%;
      height: 320px;
    }
    
    .page-content {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    
    .page-title {
      font-size: 18px;
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .table th,
    .table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .table th {
      background: #fafafa;
      font-weight: 600;
      color: #666;
      font-size: 13px;
    }
    
    .table td {
      font-size: 14px;
      color: #333;
    }
    
    .table tr:hover {
      background: #fafafa;
    }
    
    .table-row-clickable {
      cursor: pointer;
      transition: background 0.2s ease;
    }
    
    .table-row-clickable:hover {
      background: #f0f7ff !important;
    }
    
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
    }
    
    .badge.green {
      background: #f6ffed;
      color: #52c41a;
    }
    
    .badge.orange {
      background: #fff7e6;
      color: #fa8c16;
    }
    
    .badge.blue {
      background: #e6f7ff;
      color: #1890ff;
    }
    
    .badge.red {
      background: #fff1f0;
      color: #f5222d;
    }
    
    .action-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-right: 8px;
      transition: all 0.3s ease;
    }
    
    .action-btn.primary {
      background: #1890ff;
      color: #fff;
    }
    
    .action-btn.primary:hover {
      background: #40a9ff;
    }
    
    .action-btn.secondary {
      background: #f0f0f0;
      color: #666;
    }
    
    .action-btn.secondary:hover {
      background: #d9d9d9;
    }
    
    .hidden {
      display: none;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid #f0f0f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    
    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal.hidden {
      display: none;
    }
    
    .modal-content {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      max-width: 700px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
    }
    
    .modal-title {
      font-size: 18px;
      color: #333;
      margin-bottom: 20px;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #1890ff;
      box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
    }
    
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    
    .btn-primary:hover {
      opacity: 0.9;
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #666;
    }
    
    .btn-secondary:hover {
      background: #d9d9d9;
    }
    
    .score-high { color: #52c41a; font-weight: 600; }
    .score-medium { color: #fa8c16; font-weight: 600; }
    .score-low { color: #f5222d; font-weight: 600; }
    
    .detail-section {
      margin-bottom: 24px;
    }
    
    .detail-section h4 {
      font-size: 15px;
      color: #333;
      margin-bottom: 12px;
    }
    
    .detail-item {
      display: flex;
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    
    .detail-label {
      width: 100px;
      color: #999;
      font-size: 14px;
    }
    
    .detail-value {
      flex: 1;
      color: #333;
      font-size: 14px;
    }
    
    .question-item {
      padding: 12px;
      background: #fafafa;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    
    .question-text {
      font-size: 14px;
      color: #333;
      margin-bottom: 8px;
    }
    
    .question-answer {
      font-size: 13px;
      color: #52c41a;
    }
    
    .strengths-list, .weaknesses-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .tag {
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
    }
    
    .tag.green {
      background: #f6ffed;
      color: #52c41a;
    }
    
    .tag.red {
      background: #fff1f0;
      color: #f5222d;
    }
    
    .student-detail-charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    
    .student-chart-container {
      background: #fafafa;
      border-radius: 8px;
      padding: 16px;
    }
    
    .student-chart-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
    }
    
    .small-chart {
      width: 100%;
      height: 200px;
    }
    
    @media (max-width: 1200px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }
      
      .student-detail-charts {
        grid-template-columns: 1fr;
      }
    }
    
    @media (max-width: 768px) {
      .sidebar {
        width: 60px;
      }
      
      .logo h1, .logo p, .nav-text {
        display: none;
      }
      
      .main-content {
        margin-left: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <h1>乐学App</h1>
      <p>教师管理后台</p>
    </div>
    <div class="nav-menu">
      <div class="nav-item active" data-page="dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-text">数据概览</span>
      </div>
      <div class="nav-item" data-page="students">
        <span class="nav-icon">👥</span>
        <span class="nav-text">学生管理</span>
      </div>
      <div class="nav-item" data-page="homework">
        <span class="nav-icon">📝</span>
        <span class="nav-text">作业管理</span>
      </div>
      <div class="nav-item" data-page="listening">
        <span class="nav-icon">🎧</span>
        <span class="nav-text">听力管理</span>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="header">
      <h2 id="pageTitle">数据概览</h2>
      <div class="user-info">
        <span class="user-name" id="userName">老师</span>
        <button class="logout-btn" onclick="logout()">退出登录</button>
      </div>
    </div>

    <div id="pageDashboard">
      <div class="stats-grid">
        <div class="stat-card blue">
          <div class="stat-icon">👥</div>
          <div class="stat-value" id="totalStudents">0</div>
          <div class="stat-label">学生总数</div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon">📝</div>
          <div class="stat-value" id="avgHomeworkScore">0</div>
          <div class="stat-label">平均作业分数</div>
        </div>
        <div class="stat-card orange">
          <div class="stat-icon">🎧</div>
          <div class="stat-value" id="avgListeningScore">0</div>
          <div class="stat-label">平均听力分数</div>
        </div>
        <div class="stat-card purple">
          <div class="stat-icon">✅</div>
          <div class="stat-value" id="submissionRate">0%</div>
          <div class="stat-label">作业提交率</div>
        </div>
      </div>

      <div class="filter-bar">
        <div class="filter-item">
          <label class="filter-label">筛选学生：</label>
          <select id="studentFilter" class="filter-select" onchange="onStudentFilterChange()">
            <option value="all">全部学生</option>
          </select>
        </div>
        <div class="filter-item">
          <label class="filter-label">时间范围：</label>
          <select id="timeRangeFilter" class="filter-select" onchange="onTimeRangeChange()">
            <option value="all">全部时间</option>
            <option value="week">最近一周</option>
            <option value="month">最近一月</option>
            <option value="term">本学期</option>
          </select>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-header">
            <div>
              <div class="chart-title">班级平均分趋势</div>
              <div class="chart-subtitle">作业与听力成绩变化</div>
            </div>
          </div>
          <div id="avgScoreTrendChart" class="chart-container"></div>
        </div>
        
        <div class="chart-card">
          <div class="chart-header">
            <div>
              <div class="chart-title">分数段分布</div>
              <div class="chart-subtitle">学生成绩分布情况</div>
            </div>
          </div>
          <div id="scoreDistributionChart" class="chart-container"></div>
        </div>
        
        <div class="chart-card full-width">
          <div class="chart-header">
            <div>
              <div class="chart-title">学生个人成绩对比</div>
              <div class="chart-subtitle">各学生作业与听力成绩</div>
            </div>
          </div>
          <div id="studentCompareChart" class="chart-container"></div>
        </div>
      </div>

      <div class="page-content">
        <h3 class="page-title">班级学习分析</h3>
        <div id="classAnalysis">
          <div class="loading">
            <div class="spinner"></div>
            <p>加载数据中...</p>
          </div>
        </div>
      </div>
    </div>

    <div id="pageStudents" class="hidden">
      <div class="page-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h3 class="page-title" style="margin-bottom: 0; padding: 0; border: none;">学生列表</h3>
        </div>
        <div id="studentsList">
          <div class="loading">
            <div class="spinner"></div>
            <p>加载数据中...</p>
          </div>
        </div>
      </div>
    </div>

    <div id="pageHomework" class="hidden">
      <div class="page-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h3 class="page-title" style="margin-bottom: 0; padding: 0; border: none;">作业列表</h3>
          <button class="btn btn-primary" onclick="showCreateHomeworkModal()">+ 新建作业</button>
        </div>
        <div id="homeworkList">
          <div class="loading">
            <div class="spinner"></div>
            <p>加载数据中...</p>
          </div>
        </div>
      </div>
    </div>

    <div id="pageListening" class="hidden">
      <div class="page-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h3 class="page-title" style="margin-bottom: 0; padding: 0; border: none;">听力材料</h3>
          <button class="btn btn-primary" onclick="showCreateListeningModal()">+ 新建材料</button>
        </div>
        <div id="listeningList">
          <div class="loading">
            <div class="spinner"></div>
            <p>加载数据中...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="studentDetailModal" class="modal hidden">
    <div class="modal-content">
      <h3 class="modal-title" id="studentDetailTitle">学生详情</h3>
      <div id="studentDetailContent"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('studentDetailModal')">关闭</button>
      </div>
    </div>
  </div>

  <div id="createHomeworkModal" class="modal hidden">
    <div class="modal-content">
      <h3 class="modal-title">创建新作业</h3>
      <form id="createHomeworkForm">
        <div class="form-group">
          <label>作业标题</label>
          <input type="text" id="hwTitle" required placeholder="请输入作业标题">
        </div>
        <div class="form-group">
          <label>作业描述</label>
          <textarea id="hwDescription" rows="3" placeholder="请输入作业描述"></textarea>
        </div>
        <div class="form-group">
          <label>作业类型</label>
          <select id="hwType">
            <option value="daily">日常作业</option>
            <option value="weekly">周测</option>
            <option value="exam">考试</option>
          </select>
        </div>
        <div class="form-group">
          <label>截止日期</label>
          <input type="date" id="hwDeadline">
        </div>
        <div class="form-group">
          <label>题目（JSON格式）</label>
          <textarea id="hwQuestions" rows="6" placeholder='[{"id":1,"type":"choice","question":"题目内容","options":["A","B","C"],"answer":"A"}]'></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('createHomeworkModal')">取消</button>
          <button type="submit" class="btn btn-primary">创建</button>
        </div>
      </form>
    </div>
  </div>

  <div id="createListeningModal" class="modal hidden">
    <div class="modal-content">
      <h3 class="modal-title">创建听力材料</h3>
      <form id="createListeningForm">
        <div class="form-group">
          <label>材料标题</label>
          <input type="text" id="lmTitle" required placeholder="请输入材料标题">
        </div>
        <div class="form-group">
          <label>音频链接</label>
          <input type="text" id="lmAudioUrl" required placeholder="请输入音频URL">
        </div>
        <div class="form-group">
          <label>听力原文</label>
          <textarea id="lmTranscript" rows="4" placeholder="请输入听力原文"></textarea>
        </div>
        <div class="form-group">
          <label>题目（JSON格式）</label>
          <textarea id="lmQuestions" rows="6" placeholder='[{"id":1,"type":"choice","question":"题目内容","options":["A","B","C"],"answer":"A"}]'></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('createListeningModal')">取消</button>
          <button type="submit" class="btn btn-primary">创建</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let token = localStorage.getItem('token');
    let userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');

    if (!token) {
      window.location.href = '/login.html';
    }

    document.getElementById('userName').textContent = userInfo.name || '老师';

    let avgScoreTrendChart = null;
    let scoreDistributionChart = null;
    let studentCompareChart = null;
    let studentRadarChart = null;
    let studentProgressChart = null;

    let allStudents = [];
    let allAnalysisData = null;
    let selectedStudentId = 'all';
    let selectedTimeRange = 'all';

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        
        const page = item.dataset.page;
        document.querySelectorAll('[id^="page"]').forEach(p => p.classList.add('hidden'));
        document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1)).classList.remove('hidden');
        
        document.getElementById('pageTitle').textContent = item.querySelector('.nav-text').textContent;
        
        if (page === 'dashboard') loadDashboard();
        if (page === 'students') loadStudents();
        if (page === 'homework') loadHomework();
        if (page === 'listening') loadListening();
      });
    });

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('userInfo');
      window.location.href = '/login.html';
    }

    async function apiRequest(url, method = 'GET', data = null) {
      const headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      };
      
      const options = { method, headers };
      if (data) options.body = JSON.stringify(data);
      
      const response = await fetch(API_BASE + url, options);
      return await response.json();
    }

    function getScoreClass(score) {
      if (score >= 80) return 'score-high';
      if (score >= 60) return 'score-medium';
      return 'score-low';
    }

    function getScoreLevel(score) {
      if (score >= 90) return '优秀';
      if (score >= 80) return '良好';
      if (score >= 70) return '中等';
      if (score >= 60) return '及格';
      return '不及格';
    }

    async function loadDashboard() {
      const data = await apiRequest('/analysis/class');
      if (data.code === 200) {
        allAnalysisData = data.data;
        updateStatsCards(data.data);
        updateStudentFilter(data.data.studentPerformance);
        renderCharts(data.data);
        renderAnalysisTable(data.data);
      }
    }

    function updateStatsCards(data) {
      document.getElementById('totalStudents').textContent = data.totalStudents;
      document.getElementById('avgHomeworkScore').textContent = data.avgHomeworkScore;
      document.getElementById('avgListeningScore').textContent = data.avgListeningScore;
      document.getElementById('submissionRate').textContent = data.homeworkSubmissionRate + '%';
    }

    function updateStudentFilter(students) {
      allStudents = students;
      const select = document.getElementById('studentFilter');
      select.innerHTML = '<option value="all">全部学生</option>';
      students.forEach(s => {
        select.innerHTML += `<option value="${s.id}">${s.name}</option>`;
      });
    }

    function onStudentFilterChange() {
      selectedStudentId = document.getElementById('studentFilter').value;
      if (allAnalysisData) {
        renderCharts(allAnalysisData);
        renderAnalysisTable(allAnalysisData);
      }
    }

    function onTimeRangeChange() {
      selectedTimeRange = document.getElementById('timeRangeFilter').value;
      if (allAnalysisData) {
        renderCharts(allAnalysisData);
      }
    }

    function renderCharts(data) {
      renderAvgScoreTrendChart(data);
      renderScoreDistributionChart(data);
      renderStudentCompareChart(data);
    }

      const chartDom = document.getElementById('avgScoreTrendChart');
      if (!avgScoreTrendChart) {
        avgScoreTrendChart = echarts.init(chartDom);
      }

      const weeks = ['第1周', '第2周', '第3周', '第4周', '第5周', '第6周'];
      
      let homeworkData = [72, 75, 78, data.avgHomeworkScore - 5, data.avgHomeworkScore - 2, data.avgHomeworkScore];
      let listeningData = [68, 70, 74, data.avgListeningScore - 4, data.avgListeningScore - 1, data.avgListeningScore];

      if (selectedStudentId !== 'all') {
        const student = data.studentPerformance.find(s => s.id == selectedStudentId);
        if (student) {
          const baseHw = student.homeworkAvg;
          const baseLs = student.listeningAvg;
          homeworkData = [baseHw - 10, baseHw - 8, baseHw - 5, baseHw - 3, baseHw - 1, baseHw];
          listeningData = [baseLs - 12, baseLs - 9, baseLs - 6, baseLs - 4, baseLs - 2, baseLs];

      }

      const option = {

          trigger: 'axis',

        legend: {
          data: ['作业平均分', '听力平均分'],
          top: 0
        },
        grid: {
          left: '3%',
          right: '4%',
          bottom: '3%',
          top: '15%',
          containLabel: true
        },
        xAxis: {
          type: 'category',
          boundaryGap: false,
          data: weeks,
          axisLine: { lineStyle: { color: '#e0e0e0' } },
          axisLabel: { color: '#666' }
        },
        yAxis: {
          type: 'value',
          min: 0,
          max: 100,
          axisLine: { lineStyle: { color: '#e0e0e0' } },
          axisLabel: { color: '#666' },
          splitLine: { lineStyle: { color: '#f5f5f5' } }
        },
        series: [
          {
            name: '作业平均分',
            type: 'line',
            smooth: true,
            data: homeworkData,
            lineStyle: { color: '#667eea', width: 3 },
            itemStyle: { color: '#667eea' },
            areaStyle: {
              color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                { offset: 0, color: 'rgba(102, 126, 234, 0.3)' },
                { offset: 1, color: 'rgba(102, 126, 234, 0.05)' }
              ])
            }
          },
          {
            name: '听力平均分',
            type: 'line',
            smooth: true,
            data: listeningData,
            lineStyle: { color: '#f093fb', width: 3 },
            itemStyle: { color: '#f093fb' },
            areaStyle: {
              color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                { offset: 0, color: 'rgba(240, 147, 251, 0.3)' },
                { offset: 1, color: 'rgba(240, 147, 251, 0.05)' }
              ])
            }
          }
        ]
      };

      avgScoreTrendChart.setOption(option);
    }

    function renderScoreDistributionChart(data) {
      const chartDom = document.getElementById('scoreDistributionChart');
      if (!scoreDistributionChart) {
        scoreDistributionChart = echarts.init(chartDom);
      }

      let scores = data.studentPerformance.map(s => s.homeworkAvg);
      if (selectedStudentId !== 'all') {
        const student = data.studentPerformance.find(s => s.id == selectedStudentId);
        if (student) {
          scores = [student.homeworkAvg, student.listeningAvg, 75, 85, 90, 65, 78, 88, 72, 80];
        }
      }

      const distribution = {
        '优秀(90-100)': scores.filter(s => s >= 90).length,
        '良好(80-89)': scores.filter(s => s >= 80 && s < 90).length,
        '中等(70-79)': scores.filter(s => s >= 70 && s < 80).length,
        '及格(60-69)': scores.filter(s => s >= 60 && s < 70).length,
        '不及格(0-59)': scores.filter(s => s < 60).length
      };

      const option = {
        tooltip: {
          trigger: 'item',
          formatter: '{b}: {c}人 ({d}%)',
          backgroundColor: 'rgba(255, 255, 255, 0.95)',
          borderColor: '#e0e0e0',
          borderWidth: 1,
          textStyle: { color: '#333' }
        },
        legend: {
          orient: 'vertical',
          right: '5%',
          top: 'center',
          textStyle: { color: '#666' }
        },
        series: [

            name: '分数分布',
            type: 'pie',
            radius: ['40%', '70%'],
            center: ['35%', '50%'],
            avoidLabelOverlap: false,
            itemStyle: {
              borderRadius: 8,
              borderColor: '#fff',
              borderWidth: 2
            },
            label: {
              show: false,
              position: 'center'
            },
            emphasis: {
              label: {
                show: true,
                fontSize: 16,
                fontWeight: 'bold'
              }
            },
            labelLine: {
              show: false
            },
            data: [
              { value: distribution['优秀(90-100)'], name: '优秀(90-100)', itemStyle: { color: '#52c41a' } },
              { value: distribution['良好(80-89)'], name: '良好(80-89)', itemStyle: { color: '#1890ff' } },
              { value: distribution['中等(70-79)'], name: '中等(70-79)', itemStyle: { color: '#13c2c2' } },
              { value: distribution['及格(60-69)'], name: '及格(60-69)', itemStyle: { color: '#fa8c16' } },
              { value: distribution['不及格(0-59)'], name: '不及格(0-59)', itemStyle: { color: '#f5222d' } }

          }
        ]
      };

      scoreDistributionChart.setOption(option);
    }

          right: '4%',

        xAxis: {

          axisLabel: { color: '#666', interval: 0, rotate: students.length > 5 ? 30 : 0 }

        yAxis: {
          type: 'value',

        },

            type: 'bar',
            data: students.map(s => s.homeworkAvg),

              color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                { offset: 0, color: '#667eea' },
                { offset: 1, color: '#764ba2' }
              ]),
              borderRadius: [4, 4, 0, 0]
            },
            barWidth: '30%'
          },
          {
            name: '听力平均分',
            type: 'bar',
            data: students.map(s => s.listeningAvg),
            itemStyle: {
              color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                { offset: 0, color: '#f093fb' },
                { offset: 1, color: '#f5576c' }
              ]),
              borderRadius: [4, 4, 0, 0]
            },
            barWidth: '30%'
          }

    function renderAnalysisTable(data) {
      let students = data.studentPerformance;
      if (selectedStudentId !== 'all') {
        students = students.filter(s => s.id == selectedStudentId);
      }

      if (students.length === 0) {
        document.getElementById('classAnalysis').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📊</div>
            <p>暂无数据</p>
          </div>
        `;
        return;
      }

      let html = '<table class="table"><thead><tr><th>学生姓名</th><th>作业平均分</th><th>听力平均分</th><th>成绩等级</th><th>操作</th></tr></thead><tbody>';
      students.forEach(s => {
        const avgScore = Math.round((s.homeworkAvg + s.listeningAvg) / 2);
        const level = getScoreLevel(avgScore);
        const levelClass = avgScore >= 80 ? 'green' : avgScore >= 60 ? 'orange' : 'red';
        html += `<tr class="table-row-clickable" onclick="viewStudentDetail(${s.id})">
          <td>${s.name}</td>
          <td class="${getScoreClass(s.homeworkAvg)}">${s.homeworkAvg}分</td>
          <td class="${getScoreClass(s.listeningAvg)}">${s.listeningAvg}分</td>
          <td><span class="badge ${levelClass}">${level}</span></td>
          <td>
            <button class="action-btn primary" onclick="event.stopPropagation(); viewStudentDetail(${s.id})">查看详情</button>
          </td>
        </tr>`;
      });
      html += '</tbody></table>';
      
      document.getElementById('classAnalysis').innerHTML = html;
    }

    async function loadStudents() {
      const data = await apiRequest('/users/students');
      if (data.code === 200) {
        if (data.data.length === 0) {
          document.getElementById('studentsList').innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">👥</div>
              <p>暂无学生数据</p>
            </div>
          `;
          return;
        }
        
        let html = '<table class="table"><thead><tr><th>姓名</th><th>用户名</th><th>年级班级</th><th>优势</th><th>操作</th></tr></thead><tbody>';
        data.data.forEach(s => {
          html += `<tr class="table-row-clickable" onclick="viewStudentDetail(${s.id})">
            <td>${s.name}</td>
            <td>${s.username}</td>
            <td>${s.grade || '-'} ${s.class_name || ''}</td>
            <td>${s.strength || '-'}</td>
            <td>
              <button class="action-btn primary" onclick="event.stopPropagation(); viewStudentDetail(${s.id})">查看详情</button>
            </td>
          </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('studentsList').innerHTML = html;
      }
    }

    async function viewStudentDetail(studentId) {
      const profileData = await apiRequest(`/students/profile/${studentId}`);
      const analysisData = await apiRequest(`/analysis/student/${studentId}`);
      
      let html = '';
      let studentName = '学生';
      
      const student = allStudents.find(s => s.id == studentId);
      if (student) studentName = student.name;
      
      document.getElementById('studentDetailTitle').textContent = studentName + ' - 学习详情';
      
      if (profileData.code === 200 && profileData.data.profile) {
        const p = profileData.data.profile;
        html += `
          <div class="detail-section">
            <h4>基本信息</h4>
            <div class="detail-item"><span class="detail-label">年级：</span><span class="detail-value">${p.grade || '-'}</span></div>
            <div class="detail-item"><span class="detail-label">班级：</span><span class="detail-value">${p.class_name || '-'}</span></div>
            <div class="detail-item"><span class="detail-label">优势：</span><span class="detail-value">${p.strength || '-'}</span></div>
            <div class="detail-item"><span class="detail-label">不足：</span><span class="detail-value">${p.weakness || '-'}</span></div>
            <div class="detail-item"><span class="detail-label">备注：</span><span class="detail-value">${p.notes || '-'}</span></div>
          </div>
        `;
      }
      
      if (analysisData.code === 200) {
        const a = analysisData.data;
        html += `
          <div class="detail-section">
            <h4>学习数据概览</h4>
            <div class="detail-item"><span class="detail-label">作业平均分：</span><span class="detail-value ${getScoreClass(a.homeworkAvg)}">${a.homeworkAvg}分</span></div>
            <div class="detail-item"><span class="detail-label">听力平均分：</span><span class="detail-value ${getScoreClass(a.listeningAvg)}">${a.listeningAvg}分</span></div>
          </div>
        `;
        
        html += `
          <div class="student-detail-charts">
            <div class="student-chart-container">
              <div class="student-chart-title">能力雷达图</div>
              <div id="studentRadarChart" class="small-chart"></div>
            </div>
            <div class="student-chart-container">
              <div class="student-chart-title">作业完成趋势</div>
              <div id="studentProgressChart" class="small-chart"></div>
            </div>
          </div>
        `;
        
        if (a.strengths && a.strengths.length > 0) {
          html += `
            <div class="detail-section">
              <h4>优势项</h4>
              <div class="strengths-list">
                ${a.strengths.map(s => `<span class="tag green">${s}</span>`).join('')}
              </div>
            </div>
          `;
        }
        
        if (a.weaknesses && a.weaknesses.length > 0) {
          html += `
            <div class="detail-section">
              <h4>待提升项</h4>
              <div class="weaknesses-list">
                ${a.weaknesses.map(w => `<span class="tag red">${w}</span>`).join('')}
              </div>
            </div>
          `;
        }
        
        if (a.recentActivity && a.recentActivity.length > 0) {
          html += `
            <div class="detail-section">
              <h4>最近活动</h4>
              ${a.recentActivity.map(act => `
                <div class="detail-item">
                  <span class="detail-label">${act.type === 'homework' ? '作业' : '听力'}：</span>
                  <span class="detail-value">${act.title} - <span class="${getScoreClass(act.score)}">${act.score}分</span></span>
                </div>
              `).join('')}
            </div>
          `;
        }

        setTimeout(() => {
          renderStudentRadarChart(a);
          renderStudentProgressChart(a);
        }, 100);
      }
      
      if (profileData.code === 200 && profileData.data.records && profileData.data.records.length > 0) {
        html += `
          <div class="detail-section">
            <h4>学习记录</h4>
            ${profileData.data.records.map(r => `
              <div class="detail-item">
                <span class="detail-label">${r.date}：</span>
                <span class="detail-value">${r.type} - ${r.content}</span>
              </div>
            `).join('')}
          </div>
        `;
      }
      
      document.getElementById('studentDetailContent').innerHTML = html;
      document.getElementById('studentDetailModal').classList.remove('hidden');
    }

              color: '#667eea'
            },
            itemStyle: {
              color: '#667eea'
            }

      studentRadarChart.setOption(option);

    function renderStudentProgressChart(data) {
      const chartDom = document.getElementById('studentProgressChart');
      if (!chartDom) return;
      
      if (studentProgressChart) {
        studentProgressChart.dispose();
      }
      
      studentProgressChart = echarts.init(chartDom);
      
      const hwHistory = data.homeworkHistory || [];
      const recentScores = hwHistory.slice(0, 5).reverse();
      const scores = recentScores.map(h => h.score || 0);

        scores.push(0, 0, 0, 0, 0);
        labels.push('第1次', '第2次', '第3次', '第4次', '第5次');
      }
      
      const option = {
        grid: {
          left: '3%',
          right: '4%',
          bottom: '3%',
          top: '10%',
          containLabel: true
        },
        xAxis: {
          type: 'category',
          data: labels,
          axisLine: { lineStyle: { color: '#e0e0e0' } },
          axisLabel: { color: '#666', fontSize: 10 }
        },
        yAxis: {
          type: 'value',
          min: 0,
          max: 100,
          axisLine: { lineStyle: { color: '#e0e0e0' } },
          axisLabel: { color: '#666', fontSize: 10 },
          splitLine: { lineStyle: { color: '#f5f5f5' } }
        },
        series: [{
          data: scores,
          type: 'bar',
          itemStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: '#667eea' },
              { offset: 1, color: '#764ba2' }
            ]),
            borderRadius: [4, 4, 0, 0]
          }
        }]
      };
      
      studentProgressChart.setOption(option);
    }

            <div class="empty-state">
              <div class="empty-icon">📝</div>
              <p>暂无作业数据</p>
            </div>

          return;

    async function viewHomeworkDetail(homeworkId) {
      const data = await apiRequest(`/homeworks/${homeworkId}`);
      if (data.code === 200) {
        const h = data.data;
        let html = `
          <div class="detail-section">
            <h4>作业信息</h4>
            <div class="detail-item"><span class="detail-label">标题：</span><span class="detail-value">${h.title}</span></div>
            <div class="detail-item"><span class="detail-label">描述：</span><span class="detail-value">${h.description || '-'}</span></div>
            <div class="detail-item"><span class="detail-label">题目数：</span><span class="detail-value">${h.questions?.length || 0}题</span></div>
          </div>
        `;
        
        if (h.questions && h.questions.length > 0) {
          html += `<div class="detail-section"><h4>题目列表</h4>`;
          h.questions.forEach((q, i) => {
            html += `
              <div class="question-item">
                <div class="question-text">${i + 1}. ${q.question}</div>
                ${q.options ? `<div style="font-size:13px;color:#666;margin-bottom:8px;">选项：${q.options.join(' / ')}</div>` : ''}
                <div class="question-answer">正确答案：${Array.isArray(q.answer) ? q.answer.join(', ') : q.answer}</div>
              </div>
            `;
          });
          html += `</div>`;
        }
        
        if (h.submissions && h.submissions.length > 0) {
          html += `<div class="detail-section"><h4>提交情况</h4>`;
          h.submissions.forEach(s => {
            html += `
              <div class="detail-item">
                <span class="detail-label">${s.student_name}：</span>
                <span class="detail-value ${getScoreClass(s.score)}">${s.score}分</span>
              </div>
            `;
          });
          html += `</div>`;
        }
        
        document.getElementById('studentDetailTitle').textContent = '作业详情';
        document.getElementById('studentDetailContent').innerHTML = html;
        document.getElementById('studentDetailModal').classList.remove('hidden');
      }
    }

    async function loadListening() {
      const data = await apiRequest('/listening');
      if (data.code === 200) {
        if (data.data.length === 0) {
          document.getElementById('listeningList').innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">🎧</div>
              <p>暂无听力材料</p>
            </div>
          `;
          return;
        }
        
        let html = '<table class="table"><thead><tr><th>标题</th><th>创建者</th><th>题目数</th><th>操作</th></tr></thead><tbody>';
        data.data.forEach(l => {
          html += `<tr>
            <td>${l.title}</td>
            <td>${l.teacher_name || '-'}</td>
            <td>${l.questions?.length || 0}题</td>
            <td>
              <button class="action-btn primary" onclick="viewListeningDetail(${l.id})">查看</button>
            </td>
          </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('listeningList').innerHTML = html;
      }
    }

    async function viewListeningDetail(materialId) {
      const data = await apiRequest(`/listening/${materialId}`);
      if (data.code === 200) {
        const l = data.data;
        let html = `
          <div class="detail-section">
            <h4>材料信息</h4>
            <div class="detail-item"><span class="detail-label">标题：</span><span class="detail-value">${l.title}</span></div>
            <div class="detail-item"><span class="detail-label">音频：</span><span class="detail-value"><a href="${l.audio_url}" target="_blank">播放音频</a></span></div>
            ${l.transcript ? `<div class="detail-item"><span class="detail-label">原文：</span><span class="detail-value">${l.transcript}</span></div>` : ''}
          </div>
        `;
        
        if (l.questions && l.questions.length > 0) {
          html += `<div class="detail-section"><h4>题目列表</h4>`;
          l.questions.forEach((q, i) => {
            html += `
              <div class="question-item">
                <div class="question-text">${i + 1}. ${q.question}</div>
                ${q.options ? `<div style="font-size:13px;color:#666;margin-bottom:8px;">选项：${q.options.join(' / ')}</div>` : ''}
                <div class="question-answer">正确答案：${Array.isArray(q.answer) ? q.answer.join(', ') : q.answer}</div>
              </div>
            `;
          });
          html += `</div>`;
        }
        
        document.getElementById('studentDetailTitle').textContent = '听力材料详情';
        document.getElementById('studentDetailContent').innerHTML = html;
        document.getElementById('studentDetailModal').classList.remove('hidden');
      }
    }

    function showCreateHomeworkModal() {
      document.getElementById('createHomeworkModal').classList.remove('hidden');
    }

    function showCreateListeningModal() {
      document.getElementById('createListeningModal').classList.remove('hidden');
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.add('hidden');
      if (studentRadarChart) {
        studentRadarChart.dispose();
        studentRadarChart = null;
      }
      if (studentProgressChart) {
        studentProgressChart.dispose();
        studentProgressChart = null;
      }
    }

    document.getElementById('createHomeworkForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      let questions = [];
      try {
        const qText = document.getElementById('hwQuestions').value;
        if (qText) {
          questions = JSON.parse(qText);
        }
      } catch (err) {
        alert('题目格式错误，请输入正确的JSON');
        return;
      }
      
      const data = {
        title: document.getElementById('hwTitle').value,
        description: document.getElementById('hwDescription').value,
        type: document.getElementById('hwType').value,
        deadline: document.getElementById('hwDeadline').value,
        questions: questions
      };
      
      const result = await apiRequest('/homeworks', 'POST', data);
      if (result.code === 200) {
        alert('创建成功！');
        closeModal('createHomeworkModal');
        loadHomework();
      } else {
        alert(result.message || '创建失败');
      }
    });

    document.getElementById('createListeningForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      let questions = [];
      try {
        const qText = document.getElementById('lmQuestions').value;
        if (qText) {
          questions = JSON.parse(qText);
        }
      } catch (err) {
        alert('题目格式错误，请输入正确的JSON');
        return;
      }
      
      const data = {
        title: document.getElementById('lmTitle').value,
        audio_url: document.getElementById('lmAudioUrl').value,
        transcript: document.getElementById('lmTranscript').value,
        questions: questions
      };
      
      const result = await apiRequest('/listening', 'POST', data);
      if (result.code === 200) {
        alert('创建成功！');
        closeModal('createListeningModal');
        loadListening();
      } else {
        alert(result.message || '创建失败');
      }
    });

    window.addEventListener('resize', () => {
      if (avgScoreTrendChart) avgScoreTrendChart.resize();
      if (scoreDistributionChart) scoreDistributionChart.resize();
      if (studentCompareChart) studentCompareChart.resize();
      if (studentRadarChart) studentRadarChart.resize();
      if (studentProgressChart) studentProgressChart.resize();
    });

    loadDashboard();
  </script>
</body>
</html>
