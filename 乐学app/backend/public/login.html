<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乐学App - 管理后台登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 48px;
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.5s ease;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .logo-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    
    .logo h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
    }
    
    .logo p {
      color: #666;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .role-selector {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .role-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      color: #666;
    }
    
    .role-btn:hover {
      border-color: #667eea;
    }
    
    .role-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border-color: transparent;
    }
    
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    
    .submit-btn:active {
      transform: translateY(0);
    }
    
    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    
    .error-message {
      background: #fff1f0;
      color: #f5222d;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .demo-accounts {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #f0f0f0;
    }
    
    .demo-accounts h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
    }
    
    .demo-accounts p {
      font-size: 13px;
      color: #999;
      line-height: 1.8;
    }
    
    .demo-accounts code {
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <h1>乐学App</h1>
      <p>智能教育平台 - 管理后台</p>
    </div>
    
    <div class="error-message" id="errorMessage"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" value="teacher" required>
      </div>
      
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" value="123456" required>
      </div>
      
      <div class="role-selector">
        <button type="button" class="role-btn active" data-role="teacher">教师</button>
        <button type="button" class="role-btn" data-role="student">学生</button>
      </div>
      
      <button type="submit" class="submit-btn">登 录</button>
    </form>
    
    <div class="demo-accounts">
      <h3>演示账号</h3>
      <p>教师：<code>teacher</code> / <code>123456</code></p>
      <p>学生：<code>student</code> / <code>123456</code></p>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let selectedRole = 'teacher';

    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRole = btn.dataset.role;
      });
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMessage');
      const submitBtn = document.querySelector('.submit-btn');
      
      errorEl.classList.remove('show');
      submitBtn.disabled = true;
      submitBtn.textContent = '登录中...';
      
      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ username, password }),
        });
        
        const data = await response.json();
        
        if (data.code === 200) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('userInfo', JSON.stringify(data.data.user));
          
          if (data.data.user.role === 'teacher') {
            window.location.href = '/admin/dashboard.html';
          } else {
            window.location.href = '/admin/student.html';
          }
        } else {
          errorEl.textContent = data.message || '登录失败';
          errorEl.classList.add('show');
        }
      } catch (error) {
        errorEl.textContent = '网络连接失败，请检查后端服务是否启动';
        errorEl.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '登 录';
      }
    });
  </script>
</body>
</html>
