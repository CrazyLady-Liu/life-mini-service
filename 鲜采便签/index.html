<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鲜采便签</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="page login-page" id="loginPage">
            <div class="login-container">
                <h1>鲜采便签</h1>
                <p class="slogan">轻松规划每一次采购</p>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="phone" placeholder="请输入手机号" maxlength="11">
                </div>
                <div class="form-group">
                    <label>验证码</label>
                    <div class="code-input">
                        <input type="text" id="code" placeholder="请输入验证码" maxlength="6">
                        <button id="sendCodeBtn" class="send-code-btn">获取验证码</button>
                    </div>
                </div>
                <button id="loginBtn" class="btn primary-btn">登录</button>
            </div>
        </div>

        <div class="page hidden" id="mainPage">
            <div class="header">
                <h2 id="pageTitle">买菜清单</h2>
            </div>

            <div class="content">
                <div class="list-page" id="listPage">
                    <div class="add-form">
                        <input type="text" id="itemName" placeholder="物品名称">
                        <input type="text" id="itemQuantity" placeholder="数量">
                        <select id="itemCategory">
                            <option value="蔬菜">蔬菜</option>
                            <option value="水果">水果</option>
                            <option value="肉类">肉类</option>
                            <option value="海鲜">海鲜</option>
                            <option value="调料">调料</option>
                            <option value="其他">其他</option>
                        </select>
                        <button id="addItemBtn" class="btn primary-btn">添加</button>
                    </div>
                    <div class="list-container">
                        <div class="list-section">
                            <h3>待买</h3>
                            <div id="pendingList" class="item-list"></div>
                        </div>
                        <div class="list-section">
                            <h3>已买</h3>
                            <div id="purchasedList" class="item-list"></div>
                        </div>
                    </div>
                </div>

                <div class="category-page hidden" id="categoryPage">
                    <div class="category-filters">
                        <button class="category-btn active" data-category="全部">全部</button>
                        <button class="category-btn" data-category="蔬菜">蔬菜</button>
                        <button class="category-btn" data-category="水果">水果</button>
                        <button class="category-btn" data-category="肉类">肉类</button>
                        <button class="category-btn" data-category="海鲜">海鲜</button>
                        <button class="category-btn" data-category="调料">调料</button>
                        <button class="category-btn" data-category="其他">其他</button>
                    </div>
                    <div class="category-list" id="categoryList"></div>
                </div>

                <div class="profile-page hidden" id="profilePage">
                    <div class="user-info">
                        <div class="avatar"></div>
                        <p id="userPhone"></p>
                    </div>
                    <div class="menu-list">
                        <div class="menu-item" id="historyBtn">
                            <span>历史清单</span>
                            <span class="arrow">›</span>
                        </div>
                        <div class="menu-item" id="clearBtn">
                            <span>清空当前清单</span>
                            <span class="arrow">›</span>
                        </div>
                        <div class="menu-item" id="logoutBtn">
                            <span>退出登录</span>
                            <span class="arrow">›</span>
                        </div>
                    </div>
                </div>

                <div class="history-page hidden" id="historyPage">
                    <div class="back-btn" id="backToProfile">‹ 返回</div>
                    <div id="historyList" class="history-list"></div>
                </div>
            </div>

            <div class="tab-bar">
                <div class="tab-item active" data-page="list">
                    <div class="tab-icon">📋</div>
                    <span>清单</span>
                </div>
                <div class="tab-item" data-page="category">
                    <div class="tab-icon">🏷️</div>
                    <span>分类</span>
                </div>
                <div class="tab-item" data-page="profile">
                    <div class="tab-icon">👤</div>
                    <span>我的</span>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
